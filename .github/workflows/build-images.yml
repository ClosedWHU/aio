name: Build and Push Images to GHCR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build (all, sso, dugout, ham-gateway, whu-sb)'
        required: true
        default: 'all'

env:
  REGISTRY: ghcr.io
  ORG: closedwhu

# Essential for pushing to GHCR using GITHUB_TOKEN
permissions:
  contents: read
  packages: write

jobs:
  build-sso:
    if: github.event.inputs.service == 'all' || github.event.inputs.service == 'sso' || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: WHU-sb/WHU-sb-SSO
          path: sso
          token: ${{ secrets.GH_PAT }}
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }} # Using GH_PAT for login to ensure org package creation permissions
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./sso/server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/sso:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/sso:${{ github.event.release.tag_name || 'latest' }}

  build-dugout:
    if: github.event.inputs.service == 'all' || github.event.inputs.service == 'dugout' || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: WHU-Dugout/WHU-Dugout-Server
          path: dugout
          token: ${{ secrets.GH_PAT }}
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./dugout
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/dugout:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/dugout:${{ github.event.release.tag_name || 'latest' }}

  build-ham-gateway:
    if: github.event.inputs.service == 'all' || github.event.inputs.service == 'ham-gateway' || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: WHU-sb/ham-gateway
          path: ham-gateway
          token: ${{ secrets.GH_PAT }}
          submodules: recursive # Critical for proto submodule
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./ham-gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/ham-gateway:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/ham-gateway:${{ github.event.release.tag_name || 'latest' }}

  build-whu-sb:
    if: github.event.inputs.service == 'all' || github.event.inputs.service == 'whu-sb' || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: WHU-sb/WHU-sb-Server
          path: whu-sb
          token: ${{ secrets.GH_PAT }}
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}
      - name: Build and Push Unified Image
        uses: docker/build-push-action@v5
        with:
          context: ./whu-sb
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/whu-sb:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/whu-sb:${{ github.event.release.tag_name || 'latest' }}
